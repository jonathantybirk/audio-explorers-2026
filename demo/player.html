<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo</title>
  <style>
    :root {
      --bg:     #f4f1ea;
      --panel:  #fffdf8;
      --text:   #1f2933;
      --muted:  #6b7280;
      --accent: #0f766e;
      --border: #d8d2c5;
      --active: #dff5f2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #efe8db 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 100%; margin: 32px auto; padding: 0 16px 48px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
    }
    .header-bar {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px; margin-bottom: 14px;
    }
    .title-block { min-width: 0; }
    h1 { font-size: 26px; margin-bottom: 4px; }

    /* ── Tabs ───────────────────────────────────────────── */
    .tabs { display: flex; gap: 4px; align-self: flex-start; flex-wrap: wrap; }
    .tab {
      padding: 9px 18px; border: 1px solid var(--border);
      border-radius: 999px; font-size: 14px; font-weight: 500;
      cursor: pointer; background: #f7f3ea; color: var(--muted);
      white-space: nowrap;
      transition: color .15s, background .15s, border-color .15s, box-shadow .15s;
    }
    .tab:hover { color: var(--text); background: #f0ede6; }
    .tab.active {
      color: var(--accent); background: var(--panel);
      border-color: var(--border);
      box-shadow: 0 3px 12px rgba(15,118,110,0.08);
    }
    .tab .tab-badge {
      display: inline-block; margin-left: 6px; font-size: 10px;
      padding: 1px 6px; border-radius: 99px;
      background: #e0f2f1; color: var(--accent); font-weight: 600;
    }

    .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.5; }
    .sub code { font-size: 12px; background: #f0ede6; padding: 1px 5px; border-radius: 4px; }
    .status { font-weight: 600; color: var(--accent); min-height: 1.4em; margin-bottom: 4px; }
    .meta   { color: var(--muted); font-size: 13px; min-height: 1.3em; margin-bottom: 14px; }

    /* ── Column toggles ─────────────────────────────────── */
    .col-toggles {
      display: flex; flex-wrap: wrap; gap: 6px;
      align-items: center; margin-bottom: 16px;
    }
    .filter-title {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-right: 4px;
    }
    .col-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); background: white;
      border-radius: 999px; padding: 5px 10px;
      font-size: 12px; color: var(--text); cursor: pointer; user-select: none;
    }
    .col-toggle input { accent-color: var(--accent); }

    /* ── Main layout ────────────────────────────────────── */
    .layout {
      display: inline-flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 100%;
    }
    .playlists-scroll {
      flex: 0 1 auto;
      min-width: 0;
      width: fit-content;
      max-width: calc(100vw - 380px);
      overflow-x: auto;
      padding-bottom: 6px;
    }
    .playlists {
      display: flex; gap: 12px; align-items: start;
      width: max-content; /* let it grow beyond scroll container */
    }
    .playlist-wrap { width: 230px; flex-shrink: 0; }
    .playlist-wrap h2 {
      font-size: 13px; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted); margin-bottom: 8px;
    }
    .playlist {
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden; background: white;
    }
    .group-header {
      padding: 7px 14px; font-size: 11px;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted); background: #f9f6ef;
      border-bottom: 1px solid var(--border);
    }
    .item {
      padding: 11px 14px; border-bottom: 1px solid #ece7dc;
      cursor: pointer; display: flex; align-items: center;
      gap: 10px; transition: background .1s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover      { background: #f5f0e6; }
    .item.active     { background: var(--active); border-left: 3px solid var(--accent); padding-left: 11px; }
    .item .num       { font-size: 12px; color: var(--muted); min-width: 22px; }
    .item .name      { flex: 1; font-size: 14px; }
    .badge {
      font-size: 11px; padding: 2px 7px; border-radius: 99px;
      background: #eee; color: #555;
    }
    .badge.das    { background: #dbeafe; color: #1e40af; }
    .badge.mvdr   { background: #d1fae5; color: #065f46; }
    .badge.mmvdr  { background: #ccfbf1; color: #0f766e; }
    .badge.auxiva { background: #fed7aa; color: #9a3412; }
    .badge.ilrma  { background: #fde68a; color: #78350f; }
    .badge.em     { background: #dcfce7; color: #166534; }
    .badge.tdica  { background: #fecdd3; color: #9f1239; }
    .badge.duet   { background: #e0e7ff; color: #4338ca; }
    .badge.mic    { background: #fef3c7; color: #92400e; }
    .badge.raw    { background: #e5e7eb; color: #374151; }
    .badge.sfwhamr  { background: #f3e8ff; color: #6b21a8; }
    .badge.sflibri  { background: #ede9fe; color: #5b21b6; }
    .badge.ctlibri  { background: #fce7f3; color: #9d174d; }
    .badge.dprnn    { background: #fdf4ff; color: #86198f; }

    /* ── Right panel ────────────────────────────────────── */
    .right { width: 300px; flex-shrink: 0; display: flex; flex-direction: column; gap: 14px; }
    audio  { width: 100%; border-radius: 8px; }
    .polar-wrap {
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; background: white;
    }
    .polar-wrap h3 {
      padding: 8px 14px; font-size: 11px;
      text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
      border-bottom: 1px solid var(--border); background: #f9f6ef;
    }
    .polar-wrap img { width: 100%; display: block; }
    .plot-note {
      padding: 10px 14px 12px; color: var(--muted);
      font-size: 12px; line-height: 1.45;
      border-top: 1px solid #ece7dc; background: #fff;
    }
    .empty-list { padding: 14px; color: var(--muted); font-size: 13px; background: white; }
    .legend { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
    .legend span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

    @media (max-width: 900px) {
      .header-bar { flex-direction: column; }
      .layout { flex-direction: column; }
      .playlists-scroll { width: 100%; max-width: 100%; }
      .right { width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <div class="header-bar">
      <div class="title-block">
        <h1>Demo</h1>
      </div>
      <div class="tabs">
        <button class="tab active" id="tab-example" onclick="switchRecording('example')">
          example_mixture.wav <span class="tab-badge">known positions</span>
        </button>
        <button class="tab" id="tab-mixture" onclick="switchRecording('mixture')">
          mixture.wav <span class="tab-badge">estimated positions</span>
        </button>
      </div>
    </div>

    <div class="sub" id="recording-sub"></div>
    <div class="status" id="status">Ready</div>
    <div class="meta"   id="meta"></div>

    <div class="col-toggles" id="col-toggles">
      <span class="filter-title">Columns</span>
    </div>

    <div class="layout">
      <div class="playlists-scroll">
        <div class="playlists" id="playlists"></div>
      </div>
      <div class="right">
        <div>
          <audio id="player" controls preload="metadata"></audio>
          <div class="meta" style="margin-top:8px;font-size:12px">
            Click to play. Click again to pause/resume. Double-click to restart.
          </div>
        </div>
        <div class="legend">
          <span><span class="dot" style="background:#6b7280"></span> Raw</span>
          <span><span class="dot" style="background:#1e40af"></span> D&S</span>
          <span><span class="dot" style="background:#065f46"></span> MVDR</span>
          <span><span class="dot" style="background:#0f766e"></span> Mask-MVDR</span>
          <span><span class="dot" style="background:#9a3412"></span> AuxIVA</span>
          <span><span class="dot" style="background:#78350f"></span> ILRMA</span>
          <span><span class="dot" style="background:#166534"></span> Spatial EM</span>
          <span><span class="dot" style="background:#4338ca"></span> DUET</span>
          <span><span class="dot" style="background:#be123c"></span> TD-ICA</span>
          <span><span class="dot" style="background:#92400e"></span> Mic</span>
          <span><span class="dot" style="background:#6b21a8"></span> SepFormer WHAMR</span>
          <span><span class="dot" style="background:#5b21b6"></span> SepFormer Libri3Mix</span>
          <span><span class="dot" style="background:#9d174d"></span> ConvTasNet</span>
          <span><span class="dot" style="background:#86198f"></span> DPRNN</span>
        </div>
        <div class="polar-wrap">
          <h3 id="polar-title"></h3>
          <img id="polar-img" alt="SRP-PHAT polar">
          <div class="plot-note" id="polar-note"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const CLICK_DELAY_MS = 150;

  // ── Track definitions ───────────────────────────────────────────────────────
  const allTracks = [];
  function track(id, rec, col, label, sub, badge, src) {
    return { id, rec, col, label, sub, badge, src };
  }

  // ── Column definitions ───────────────────────────────────────────────────────
  // colDefault: whether the column is visible by default
  // sections[].secDefault: whether the section is shown by default within the column
  const ALL_COLS = [
    { id: "raw",      label: "Raw",             colDefault: true, sections: [
        { key: "scene",  header: "Scene",         secDefault: true },
        { key: "mic",    header: "Microphones",   secDefault: true },
    ]},
    { id: "beamform", label: "Beamforming",      colDefault: true, sections: [
        { key: "das",    header: "Delay-and-Sum", secDefault: false },
        { key: "mvdr",   header: "MVDR",          secDefault: false },
        { key: "mmvdr",  header: "Mask-MVDR",     secDefault: true },
        { key: "mmvdr_em", header: "Mask-MVDR (Spatial EM)", secDefault: false },
        { key: "diar_mvdr", header: "Diarization-MVDR", secDefault: false },
    ]},
    { id: "bss",      label: "Source Separation",colDefault: true, sections: [
        { key: "duet",   header: "DUET",          secDefault: false },
        { key: "tdica",  header: "Time-domain ICA",secDefault: false },
        { key: "auxiva", header: "AuxIVA",        secDefault: true },
        { key: "auxiva_tuned", header: "AuxIVA Tuned", secDefault: false },
        { key: "ilrma",  header: "ILRMA",         secDefault: true },
        { key: "ilrma_tuned", header: "ILRMA Tuned", secDefault: false },
        { key: "spatial_em", header: "Spatial EM", secDefault: false },
    ]},
    { id: "dl",       label: "Deep Learning",    colDefault: true, sections: [
        { key: "sfwhamr",  header: "SepFormer WHAMR ★",  secDefault: true },
        { key: "sflibri",  header: "SepFormer Libri3Mix", secDefault: false },
        { key: "ctlibri",  header: "ConvTasNet LibriMix", secDefault: false },
        { key: "dprnn",    header: "DPRNN WHAM!",         secDefault: false },
    ]},
  ];

  // ── EXAMPLE MIXTURE ─────────────────────────────────────────────────────────
  const EX = "example";
  const A  = "audio";

  allTracks.push(track("ex_raw_scene", EX, "scene",
    "example_mixture.wav", "original 4-channel mixture", "raw", "../data/raw/example_mixture.wav"));

  for (const [k, lbl] of [["LF","Left Front"],["LR","Left Rear"],["RF","Right Front"],["RR","Right Rear"]])
    allTracks.push(track(`ex_mic_${k}`, EX, "mic", `${k} — ${lbl}`, "single mic channel", "mic", `${A}/mic_${k}.wav`));

  for (const [dirKey, dirLabel] of [
    ["0deg_front","0° Front"],["90deg_left","90° Left"],
    ["180deg_back","180° Back"],["270deg_right","270° Right"]
  ]) {
    allTracks.push(track(`ex_das_${dirKey}`,  EX, "das",  `${dirLabel} — D&S`,  `steered to ${dirLabel}`, "das",  `${A}/das_${dirKey}.wav`));
    allTracks.push(track(`ex_mvdr_${dirKey}`, EX, "mvdr", `${dirLabel} — MVDR`, `steered to ${dirLabel}`, "mvdr", `${A}/mvdr_${dirKey}.wav`));
  }

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","4"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","180"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_mmvdr_${dirKey}`, EX, "mmvdr", `${dirLabel} — Mask-MVDR`, `est. ${doa}°`, "mmvdr", `../analysis/mask_mvdr/beamformed/mmvdr_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","0"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","176"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_mmvdr_em_${dirKey}`, EX, "mmvdr_em", `${dirLabel} — Mask-MVDR (Spatial EM)`, `prototype · est. ${doa}° · Spatial EM masks`, "mmvdr", `../analysis/spatial_em/beamformed/spatial_em_mmvdr_example_${dirKey}.wav`));

  for (const [spk, mos, activity] of [
    ["SPEAKER_00","1.62","92%"],["SPEAKER_01","1.71","85%"]
  ])
    allTracks.push(track(`ex_diar_mvdr_${spk}`, EX, "diar_mvdr", `Speaker ${spk.replace("SPEAKER_", "")} — Diarization-MVDR`, `pyannote diarization · 2 speakers found · activity ${activity} · DNSMOS ${mos}`, "mvdr", `../analysis/dl_separation/separated/example_diar_mvdr_${spk}.wav`));

  for (let i = 1; i <= 4; i++)
    allTracks.push(track(`ex_tdica_${i}`, EX, "tdica", `TD-ICA component ${i}`, "FastICA component", "tdica", `../analysis/ica/separated/tdica_component_${i}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","356"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","176"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_duet_${dirKey}`, EX, "duet", `${dirLabel} — DUET`, `est. ${doa}°`, "duet", `../analysis/duet/separated/duet_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","4"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","180"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_auxiva_${dirKey}`, EX, "auxiva", `${dirLabel} — AuxIVA`, `default hp · est. ${doa}° · hop=1024 iter=30`, "auxiva", `../analysis/ica/separated/ica_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","4"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","180"],["270deg_right","270° Right","286"]
  ])
    allTracks.push(track(`ex_ilrma_${dirKey}`,  EX, "ilrma",  `${dirLabel} — ILRMA`,  `default hp · est. ${doa}°`, "ilrma",  `../analysis/ilrma/separated/ilrma_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","2"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","180"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_auxiva_tuned_${dirKey}`, EX, "auxiva_tuned", `${dirLabel} — AuxIVA tuned`, `tuned hp · est. ${doa}° · hop=512 iter=90`, "auxiva", `../analysis/ica/separated/ica_tuned_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","4"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","180"],["270deg_right","270° Right","290"]
  ])
    allTracks.push(track(`ex_ilrma_tuned_${dirKey}`, EX, "ilrma_tuned", `${dirLabel} — ILRMA tuned`, `tuned hp · est. ${doa}° · hop=512 iter=110 · NMF_k=2`, "ilrma", `../analysis/ilrma/separated/ilrma_tuned_${dirKey}.wav`));

  for (const [dirKey, dirLabel, doa] of [
    ["0deg_front","0° Front","0"],["90deg_left","90° Left","90"],
    ["180deg_back","180° Back","176"],["270deg_right","270° Right","270"]
  ])
    allTracks.push(track(`ex_spatial_em_${dirKey}`, EX, "spatial_em", `${dirLabel} — Spatial EM`, `prototype · est. ${doa}° · probabilistic masks · SRP-seeded fallback`, "em", `../analysis/spatial_em/separated/spatial_em_example_${dirKey}.wav`));

  // ── EXAMPLE — Deep Learning ──────────────────────────────────────────────────
  const DL = "../analysis/dl_separation/separated";

  // SepFormer WHAMR — best result: reverberant training, lowest cross-corr (0.099), highest MOS (2.56)
  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`ex_sfwhamr_${i}`, EX, "sfwhamr",
      `Source ${i} — SepFormer WHAMR`,
      `2-src · reverberant training · DNSMOS ${i===1?"2.48":"2.63"}`,
      "sfwhamr", `${DL}/example_sepformer_whamr_src${i}.wav`));

  // SepFormer Libri3Mix
  for (let i = 1; i <= 3; i++)
    allTracks.push(track(`ex_sflibri_${i}`, EX, "sflibri",
      `Source ${i} — SepFormer Libri3Mix`,
      `3-src · noisy LibriMix`,
      "sflibri", `${DL}/example_sepformer_libri3mix_src${i}.wav`));

  // ConvTasNet LibriMix clean
  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`ex_ctlibri_${i}`, EX, "ctlibri",
      `Source ${i} — ConvTasNet LibriMix`,
      `2-src · anechoic training`,
      "ctlibri", `${DL}/example_convtasnet_libri2mix_clean_src${i}.wav`));

  // DPRNN WHAM!
  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`ex_dprnn_${i}`, EX, "dprnn",
      `Source ${i} — DPRNN WHAM!`,
      `2-src · some reverb`,
      "dprnn", `${DL}/example_dprnn_wham_clean_src${i}.wav`));

  // ── MIXTURE ─────────────────────────────────────────────────────────────────
  const MIX = "mixture";
  const MA  = "audio_mixture";

  allTracks.push(track("mix_raw_scene", MIX, "scene",
    "mixture.wav", "original 4-channel mixture", "raw", "../data/raw/mixture.wav"));

  for (const [k, lbl] of [["LF","Left Front"],["LR","Left Rear"],["RF","Right Front"],["RR","Right Rear"]])
    allTracks.push(track(`mix_mic_${k}`, MIX, "mic", `${k} — ${lbl}`, "single mic channel", "mic", `${MA}/mic_${k}.wav`));

  for (const [key, lbl] of [["2deg","~2°"],["90deg","90°"],["270deg","270°"],["358deg","~358°"]]) {
    allTracks.push(track(`mix_das_${key}`,  MIX, "das",  `${lbl} — D&S`,  `SRP-PHAT est. ${lbl}`, "das",  `${MA}/das_${key}.wav`));
    allTracks.push(track(`mix_mvdr_${key}`, MIX, "mvdr", `${lbl} — MVDR`, `SRP-PHAT est. ${lbl}`, "mvdr", `${MA}/mvdr_${key}.wav`));
  }

  for (const [n, key, lbl] of [[1,"180deg","180°"],[2,"313deg","~313°"],[3,"0deg","~0°"],[4,"134deg","~134°"]]) {
    allTracks.push(track(`mix_mmvdr_${n}`,  MIX, "mmvdr",  `Source ${n} ${lbl} — Mask-MVDR`, `est. ${lbl}`, "mmvdr",  `${MA}/mmvdr_source_${n}_${key}.wav`));
    allTracks.push(track(`mix_ilrma_${n}`,  MIX, "ilrma",  `Source ${n} ${lbl} — ILRMA`,     `default hp · est. ${lbl}`, "ilrma",  `${MA}/ilrma_source_${n}_${key}.wav`));
  }

  for (const [spk, mos, activity] of [
    ["SPEAKER_00","1.86","98%"],["SPEAKER_01","1.97","49%"]
  ])
    allTracks.push(track(`mix_diar_mvdr_${spk}`, MIX, "diar_mvdr", `Speaker ${spk.replace("SPEAKER_", "")} — Diarization-MVDR`, `pyannote diarization · 2 speakers found · activity ${activity} · DNSMOS ${mos}`, "mvdr", `../analysis/dl_separation/separated/mixture_diar_mvdr_${spk}.wav`));

  for (const [n, key, lbl] of [[1,"178deg","~178°"],[2,"313deg","~313°"],[3,"356deg","~356°"],[4,"134deg","~134°"]])
    allTracks.push(track(`mix_auxiva_${n}`, MIX, "auxiva", `Source ${n} ${lbl} — AuxIVA`, `default hp · est. ${lbl} · hop=1024 iter=30`, "auxiva", `${MA}/auxiva_source_${n}_${key}.wav`));

  for (const [n, key, lbl] of [[1,"178deg","~178°"],[2,"313deg","~313°"],[3,"356deg","~356°"],[4,"134deg","~134°"]])
    allTracks.push(track(`mix_auxiva_tuned_${n}`, MIX, "auxiva_tuned", `Source ${n} ${lbl} — AuxIVA tuned`, `example-tuned hp · est. ${lbl} · hop=512 iter=90`, "auxiva", `${MA}/auxiva_tuned_source_${n}_${key}.wav`));

  for (const [n, key, lbl] of [[1,"178deg","~178°"],[2,"313deg","~313°"],[3,"358deg","~358°"],[4,"134deg","~134°"]])
    allTracks.push(track(`mix_ilrma_tuned_${n}`, MIX, "ilrma_tuned", `Source ${n} ${lbl} — ILRMA tuned`, `example-tuned hp · est. ${lbl} · hop=512 iter=110 · NMF_k=2`, "ilrma", `${MA}/ilrma_tuned_source_${n}_${key}.wav`));

  for (const [n, az, lbl] of [[1,"90","90°"],[2,"119","119°"],[3,"184","~184°"],[4,"270","270°"]])
    allTracks.push(track(`mix_duet_${n}`, MIX, "duet",
      `${lbl} — DUET`, `est. ${lbl} · no front found`,
      "duet", `../analysis/duet/separated/duet_mixture_source_${n}_${az}deg.wav`));

  // ── MIXTURE — Deep Learning ───────────────────────────────────────────────────
  // SepFormer WHAMR — MOS 2.61, cross-corr 0.235 (vs 0.099 on example — harder scene)
  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`mix_sfwhamr_${i}`, MIX, "sfwhamr",
      `Source ${i} — SepFormer WHAMR`,
      `2-src · reverberant training · DNSMOS ${i===1?"2.68":"2.54"}`,
      "sfwhamr", `${DL}/mixture_sepformer_whamr_src${i}.wav`));

  for (let i = 1; i <= 3; i++)
    allTracks.push(track(`mix_sflibri_${i}`, MIX, "sflibri",
      `Source ${i} — SepFormer Libri3Mix`,
      `3-src · noisy LibriMix`,
      "sflibri", `${DL}/mixture_sepformer_libri3mix_src${i}.wav`));

  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`mix_ctlibri_${i}`, MIX, "ctlibri",
      `Source ${i} — ConvTasNet LibriMix`,
      `2-src · anechoic training`,
      "ctlibri", `${DL}/mixture_convtasnet_libri2mix_clean_src${i}.wav`));

  for (let i = 1; i <= 2; i++)
    allTracks.push(track(`mix_dprnn_${i}`, MIX, "dprnn",
      `Source ${i} — DPRNN WHAM!`,
      `2-src · some reverb`,
      "dprnn", `${DL}/mixture_dprnn_wham_clean_src${i}.wav`));

  // ── Per-recording metadata ──────────────────────────────────────────────────
  const RECORDING_META = {
    example: {
      sub: `<code>example_mixture.wav</code> — four talkers at known positions 0° / 90° / 180° / 270°.<br>
            Beamforming uses those angles. DoA methods estimate ~3° / 90° / ~178° / 270°.<br>
            Spatial EM prototype currently recovers 0° / 90° / ~176° / 270°, but its mask templates still fall back to SRP-seeded angles.<br>
            Spatial-EM mask MVDR is included as an experimental beamforming subsection, hidden by default.<br>
            Diarization-guided MVDR is also included as an experimental beamforming subsection, but pyannote only found 2 speakers on this file (mean DNSMOS 1.67).<br>
            When multiple versions exist, the default clip set stays visible and alternate/tuned variants are kept in hidden subsections.`,
      polarTitle: "SRP-PHAT — example_mixture",
      polarSrc:   "../analysis/srp_phat/spatial_spectrum/srp_phat_polar.png",
      polarNote:  "SRP-PHAT spatial spectrum of <code>example_mixture.wav</code>. DoA estimates: ~3°, 90°, ~178°, 270°. Known positions: 0°, 90°, 180°, 270°.",
    },
    mixture: {
      sub: `<code>mixture.wav</code> — talker positions unknown, estimated from the signal.<br>
            SRP-PHAT: ~2° / 90° / 270° / 358°.<br>
            AuxIVA default DoA: ~134° / ~178° / ~313° / ~356°.<br>
            AuxIVA transfer from <code>example_mixture.wav</code>: same DoA set on the current run.<br>
            When multiple versions exist, the default clip set stays visible and alternate/tuned variants are kept in hidden subsections.<br>
            ILRMA default DoA: ~0° / ~134° / 180° / ~313°.<br>
            ILRMA transfer from <code>example_mixture.wav</code>: ~134° / ~178° / ~313° / ~358°.<br>
            Diarization-guided MVDR is included as an experimental beamforming subsection, but pyannote only found 2 speakers on this file as well (mean DNSMOS 1.92).`,
      polarTitle: "SRP-PHAT — mixture",
      polarSrc:   "../analysis/srp_phat/mixture_spectrum/srp_phat_mixture_polar.png",
      polarNote:  "SRP-PHAT spatial spectrum of <code>mixture.wav</code>. Estimated peaks: ~2°, 90°, 270°, 358°.",
    },
  };

  // ── State ───────────────────────────────────────────────────────────────────
  let currentRecording = "example";
  let enabledCols = {};    // col.id → boolean
  let enabledSecs = {};    // section key → boolean
  let selectedTrackId = null;
  let clickTimer = null;

  const audioEl   = document.getElementById("player");
  const statusEl  = document.getElementById("status");
  const metaEl    = document.getElementById("meta");
  const playlistsEl = document.getElementById("playlists");
  const togglesEl   = document.getElementById("col-toggles");

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function tracksForRecording(rec) {
    return allTracks.filter(t => t.rec === rec);
  }

  function colHasTracks(colId, rec) {
    const col = ALL_COLS.find(c => c.id === colId);
    const sectionKeys = col.sections.map(s => s.key);
    return allTracks.some(t => t.rec === rec && sectionKeys.includes(t.col));
  }

  function getVisibleTracks() {
    return allTracks.filter(t =>
      t.rec === currentRecording && enabledCols[colForSection(t.col)] && enabledSecs[t.col]
    );
  }

  function colForSection(secKey) {
    for (const col of ALL_COLS)
      if (col.sections.some(s => s.key === secKey)) return col.id;
    return null;
  }

  // ── Build column toggles ─────────────────────────────────────────────────────
  function buildToggles() {
    togglesEl.innerHTML = `<span class="filter-title">Columns</span>`;
    for (const col of ALL_COLS) {
      if (!colHasTracks(col.id, currentRecording)) continue;
      const label = document.createElement("label");
      label.className = "col-toggle";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = !!enabledCols[col.id];
      cb.addEventListener("change", () => {
        enabledCols[col.id] = cb.checked;
        syncSelectionAfterVisibilityChange();
        renderPlaylists();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(" " + col.label));
      togglesEl.appendChild(label);
    }
  }

  // ── Render all columns ──────────────────────────────────────────────────────
  function renderPlaylists() {
    // Global numbering across all fully-visible tracks
    const idxMap = new Map(getVisibleTracks().map((t, i) => [t.id, i]));

    playlistsEl.innerHTML = "";
    for (const col of ALL_COLS) {
      if (!colHasTracks(col.id, currentRecording)) continue;
      if (!enabledCols[col.id]) continue;

      const wrap = document.createElement("div");
      wrap.className = "playlist-wrap";

      // Column header + section toggles (only for sections that exist here)
      const h2 = document.createElement("h2");
      h2.textContent = col.label;
      wrap.appendChild(h2);

      const existingSecs = col.sections.filter(s =>
        allTracks.some(t => t.rec === currentRecording && t.col === s.key)
      );
      if (existingSecs.length > 1) {
        const secToggles = document.createElement("div");
        secToggles.style.cssText = "display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;";
        for (const sec of existingSecs) {
          const lbl = document.createElement("label");
          lbl.className = "col-toggle";
          lbl.style.fontSize = "11px";
          lbl.style.padding  = "3px 8px";
          const cb = document.createElement("input");
          cb.type    = "checkbox";
          cb.checked = !!enabledSecs[sec.key];
          cb.addEventListener("change", () => {
            enabledSecs[sec.key] = cb.checked;
            syncSelectionAfterVisibilityChange();
            renderPlaylists();
          });
          lbl.appendChild(cb);
          lbl.appendChild(document.createTextNode(" " + sec.header));
          secToggles.appendChild(lbl);
        }
        wrap.appendChild(secToggles);
      }

      const list = document.createElement("div");
      list.className = "playlist";

      for (const sec of col.sections) {
        if (!enabledSecs[sec.key]) continue;
        const secTracks = allTracks.filter(t =>
          t.rec === currentRecording && t.col === sec.key
        );
        if (!secTracks.length) continue;
        if (existingSecs.length > 1) {
          const hdr = document.createElement("div");
          hdr.className = "group-header";
          hdr.textContent = sec.header;
          list.appendChild(hdr);
        }
        for (const t of secTracks)
          list.appendChild(makeItem(t, idxMap.get(t.id) ?? 0));
      }

      if (!list.childElementCount) {
        const empty = document.createElement("div");
        empty.className = "empty-list";
        empty.textContent = "No sections enabled.";
        list.appendChild(empty);
      }

      wrap.appendChild(list);
      playlistsEl.appendChild(wrap);
    }
  }

  function makeItem(t, displayIdx) {
    const item = document.createElement("div");
    item.className = "item";
    if (t.id === selectedTrackId) item.classList.add("active");
    item.dataset.trackId = t.id;
    item.innerHTML = `
      <span class="num">${String(displayIdx + 1).padStart(2, "0")}</span>
      <span class="name">${t.label}${t.sub
        ? `<br><span style="font-size:11px;color:#999">${t.sub}</span>` : ""}</span>
      <span class="badge ${t.badge}">${t.badge.toUpperCase()}</span>`;
    item.addEventListener("click",    () => scheduleTrackClick(t.id));
    item.addEventListener("dblclick", () => handleTrackDoubleClick(t.id));
    return item;
  }

  // ── Tab switching ───────────────────────────────────────────────────────────
  function switchRecording(rec) {
    currentRecording = rec;
    document.getElementById("tab-example").classList.toggle("active", rec === "example");
    document.getElementById("tab-mixture").classList.toggle("active", rec === "mixture");

    // Reset to defaults
    enabledCols = {};
    enabledSecs = {};
    for (const col of ALL_COLS) {
      enabledCols[col.id] = col.colDefault && colHasTracks(col.id, rec);
      for (const sec of col.sections)
        enabledSecs[sec.key] = sec.secDefault;
    }

    const meta = RECORDING_META[rec];
    document.getElementById("recording-sub").innerHTML = meta.sub;
    document.getElementById("polar-title").textContent = meta.polarTitle;
    document.getElementById("polar-img").src           = meta.polarSrc;
    document.getElementById("polar-note").innerHTML    = meta.polarNote;

    buildToggles();
    syncSelectionAfterVisibilityChange();
    renderPlaylists();
  }

  // ── Status ──────────────────────────────────────────────────────────────────
  function updateStatus() {
    const t = allTracks.find(t => t.id === selectedTrackId) || null;
    if (!t) {
      statusEl.textContent = "No clip selected";
      metaEl.textContent   = "Click a clip to play it.";
      return;
    }
    metaEl.textContent = `${t.label}  ·  ${t.src.split("/").pop()}`;
    if (!audioEl.paused)              statusEl.textContent = `Playing: ${t.src.split("/").pop()}`;
    else if (audioEl.ended)           statusEl.textContent = `Finished: ${t.src.split("/").pop()}`;
    else if (audioEl.currentTime > 0) statusEl.textContent = `Paused: ${t.src.split("/").pop()}`;
    else                              statusEl.textContent = "Ready";
  }

  // ── Selection ───────────────────────────────────────────────────────────────
  function clearSelection() {
    selectedTrackId = null;
    audioEl.pause();
    audioEl.removeAttribute("src");
    audioEl.load();
    renderPlaylists();
    updateStatus();
  }

  function syncSelectionAfterVisibilityChange() {
    const vis = getVisibleTracks();
    if (selectedTrackId && !vis.some(t => t.id === selectedTrackId)) clearSelection();
    else updateStatus();
  }

  function selectTrack(id) {
    const t = getVisibleTracks().find(t => t.id === id);
    if (!t) return null;
    selectedTrackId = t.id;
    if (audioEl.getAttribute("src") !== t.src) {
      audioEl.src = t.src;
      audioEl.currentTime = 0;
    }
    renderPlaylists();
    updateStatus();
    document.querySelector(`.item[data-track-id="${id}"]`)?.scrollIntoView({ block: "nearest" });
    return t;
  }

  audioEl.addEventListener("play",   updateStatus);
  audioEl.addEventListener("pause",  updateStatus);
  audioEl.addEventListener("ended",  updateStatus);

  function handleSingleTrackClick(id) {
    if (id === selectedTrackId) { audioEl.paused ? audioEl.play() : audioEl.pause(); return; }
    selectTrack(id);
    audioEl.currentTime = 0;
    audioEl.play();
  }

  function scheduleTrackClick(id) {
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { handleSingleTrackClick(id); clickTimer = null; }, CLICK_DELAY_MS);
  }

  function handleTrackDoubleClick(id) {
    clearTimeout(clickTimer); clickTimer = null;
    if (id !== selectedTrackId) selectTrack(id);
    audioEl.currentTime = 0;
    audioEl.play();
  }

  // Initial render
  switchRecording("example");
</script>
</body>
</html>
