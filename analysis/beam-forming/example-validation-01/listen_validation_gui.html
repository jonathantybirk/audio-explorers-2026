<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Example Validation Player</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --text: #1f2933;
      --muted: #6b7280;
      --accent: #0f766e;
      --border: #d8d2c5;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #efe8db 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 4px;
      font-size: 28px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }
    .status {
      margin: 12px 0;
      font-weight: 600;
      color: var(--accent);
    }
    .meta {
      margin: 4px 0 16px;
      color: var(--muted);
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    button {
      border: 1px solid var(--border);
      background: white;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      border-color: var(--accent);
    }
    .layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
    }
    .playlist {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: white;
    }
    .item {
      padding: 12px 14px;
      border-bottom: 1px solid #ece7dc;
      cursor: pointer;
    }
    .item:last-child {
      border-bottom: none;
    }
    .item.active {
      background: #dff5f2;
      border-left: 4px solid var(--accent);
      padding-left: 10px;
    }
    .item .small {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    audio {
      width: 100%;
      margin-top: 12px;
    }
    @media (max-width: 760px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>example-validation-01</h1>
      <div class="sub">Order: closest -> geom_das -> mvdr for each direction</div>

      <div id="status" class="status">Idle</div>
      <div id="meta" class="meta"></div>

      <div class="controls">
        <button id="prevBtn">Previous</button>
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="replayBtn">Replay</button>
        <button id="nextBtn">Next</button>
      </div>

      <div class="layout">
        <div class="playlist" id="playlist"></div>
        <div>
          <div>Built-in browser controls:</div>
          <audio id="player" controls preload="metadata"></audio>
          <div class="meta">Double-click a track or use the buttons above.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const directions = ["0deg_front", "90deg_left", "180deg_back", "270deg_right"];
    const methods = ["closest", "geom_das", "mvdr"];
    const tracks = [];
    for (const direction of directions) {
      for (const method of methods) {
        tracks.push({
          direction,
          method,
          filename: `${method}_${direction}.wav`,
          src: `audio/${method}_${direction}.wav`,
        });
      }
    }

    const playlistEl = document.getElementById("playlist");
    const statusEl = document.getElementById("status");
    const metaEl = document.getElementById("meta");
    const audioEl = document.getElementById("player");
    let index = 0;

    function renderPlaylist() {
      playlistEl.innerHTML = "";
      tracks.forEach((track, i) => {
        const item = document.createElement("div");
        item.className = "item" + (i === index ? " active" : "");
        item.innerHTML = `<div>${String(i + 1).padStart(2, "0")}. ${track.direction}</div><div class="small">${track.method} | ${track.filename}</div>`;
        item.addEventListener("click", () => {
          selectIndex(i);
        });
        item.addEventListener("dblclick", () => {
          selectIndex(i);
          playCurrent();
        });
        playlistEl.appendChild(item);
      });
    }

    function selectIndex(i) {
      index = Math.max(0, Math.min(i, tracks.length - 1));
      const track = tracks[index];
      audioEl.src = track.src;
      statusEl.textContent = "Ready";
      metaEl.textContent = `Direction: ${track.direction} | Method: ${track.method} | File: ${track.filename}`;
      renderPlaylist();
    }

    function playCurrent() {
      audioEl.play();
    }

    function pauseCurrent() {
      audioEl.pause();
    }

    function replayCurrent() {
      audioEl.currentTime = 0;
      audioEl.play();
    }

    document.getElementById("prevBtn").addEventListener("click", () => selectIndex(index - 1));
    document.getElementById("playBtn").addEventListener("click", playCurrent);
    document.getElementById("pauseBtn").addEventListener("click", pauseCurrent);
    document.getElementById("replayBtn").addEventListener("click", replayCurrent);
    document.getElementById("nextBtn").addEventListener("click", () => selectIndex(index + 1));

    audioEl.addEventListener("play", () => {
      statusEl.textContent = `Playing: ${tracks[index].filename}`;
    });
    audioEl.addEventListener("pause", () => {
      if (audioEl.currentTime < audioEl.duration) {
        statusEl.textContent = `Paused: ${tracks[index].filename}`;
      }
    });
    audioEl.addEventListener("ended", () => {
      statusEl.textContent = `Finished: ${tracks[index].filename}`;
    });

    selectIndex(0);
  </script>
</body>
</html>
